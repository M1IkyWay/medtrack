# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# It builds on the recommended flutter_lints set with a few stricter rules that
# reflect MedTrack's conventions (immutable models, explicit return types,
# single quotes, trailing commas). Generated files are excluded from analysis.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.gr.dart"
    - "lib/l10n/app_localizations*.dart"
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_single_quotes
    - require_trailing_commas
    - sort_child_properties_last
    - unawaited_futures
    - use_key_in_widget_constructors
