<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MedTrack</title>
  <style>
    body {
      margin: 0; min-height: 100vh; background: #f7faf9; color: #16211f;
      display: flex; align-items: center; justify-content: center;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .card { text-align: center; padding: 40px 24px; max-width: 460px; }
    .badge {
      width: 72px; height: 72px; border-radius: 18px; background: #1B9E8F;
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-size: 40px; margin-bottom: 16px;
    }
    h1 { margin: 0 0 6px; font-size: 26px; }
    p { color: #5b6b68; margin: 0 0 24px; }
    a {
      display: inline-block; margin: 6px; padding: 10px 18px; border-radius: 10px;
      text-decoration: none; color: #1B9E8F; border: 1px solid #1B9E8F;
    }
    a.primary { background: #1B9E8F; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">💊</div>
    <h1>MedTrack</h1>
    <p>A privacy-first, offline medication reminder built with Flutter.</p>
    <a class="primary" href="https://github.com/M1IkyWay/medtrack">View on GitHub</a>
    <a href="privacy-policy.html">Privacy Policy</a>
  </div>
</body>
</html>
